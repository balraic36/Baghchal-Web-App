<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baghchal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col justify-between">

    <div id="selection-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center">
        <div class="bg-[#1f4068] p-6 rounded-2xl text-center border-2 border-emerald-400">
            <h2 class="text-2xl font-bold text-white mb-4">Select Your Side</h2>
            <div class="flex gap-4 justify-center">
                <button onclick="startGame('TIGER')" class="bg-red-500 hover:bg-red-600 px-6 py-3 rounded-xl font-bold text-white text-lg">🐅 TIGER</button>
                <button onclick="startGame('GOAT')" class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-xl font-bold text-white text-lg">🐐 GOAT</button>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-center bg-[#16213e] p-3 rounded-xl shadow-md mb-2">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🪙</span>
            <div>
                <p class="text-xs text-gray-400">Coins</p>
                <p id="coin-count" class="font-bold text-yellow-400 text-sm">1,500</p>
            </div>
        </div>
        <div class="text-center bg-[#0f3460] px-4 py-1 rounded-lg">
            <p class="text-xs text-gray-400">TURN</p>
            <p id="current-turn" class="font-bold text-emerald-400 text-sm tracking-wider">-</p>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400">Timer</p>
            <p id="game-timer" class="font-bold text-rose-500 text-sm">60s</p>
        </div>
    </div>

    <div class="relative w-full aspect-square max-w-[360px] mx-auto my-2">
        <div class="board-grid w-full h-full p-2" id="board">
            <svg class="line-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <line x1="10" y1="10" x2="90" y2="10" stroke="#4e54c8" stroke-width="1"/>
                <line x1="10" y1="30" x2="90" y2="30" stroke="#4e54c8" stroke-width="1"/>
                <line x1="10" y1="50" x2="90" y2="50" stroke="#4e54c8" stroke-width="1"/>
                <line x1="10" y1="70" x2="90" y2="70" stroke="#4e54c8" stroke-width="1"/>
                <line x1="10" y1="90" x2="90" y2="90" stroke="#4e54c8" stroke-width="1"/>
                
                <line x1="10" y1="10" x2="10" y2="90" stroke="#4e54c8" stroke-width="1"/>
                <line x1="30" y1="10" x2="30" y2="90" stroke="#4e54c8" stroke-width="1"/>
                <line x1="50" y1="10" x2="50" y2="90" stroke="#4e54c8" stroke-width="1"/>
                <line x1="70" y1="10" x2="70" y2="90" stroke="#4e54c8" stroke-width="1"/>
                <line x1="90" y1="10" x2="90" y2="90" stroke="#4e54c8" stroke-width="1"/>

                <line x1="10" y1="10" x2="90" y2="90" stroke="#4e54c8" stroke-width="1"/>
                <line x1="90" y1="10" x2="10" y2="90" stroke="#4e54c8" stroke-width="1"/>
                
                <line x1="50" y1="10" x2="90" y2="50" stroke="#4e54c8" stroke-width="1"/>
                <line x1="90" y1="50" x2="50" y2="90" stroke="#4e54c8" stroke-width="1"/>
                <line x1="50" y1="90" x2="10" y2="50" stroke="#4e54c8" stroke-width="1"/>
                <line x1="10" y1="50" x2="50" y2="10" stroke="#4e54c8" stroke-width="1"/>
            </svg>
        </div>
    </div>

    <div class="bg-[#16213e] p-3 rounded-xl shadow-md mt-2">
        <p class="text-sm text-gray-300 font-bold mb-2">🏆 Top Players</p>
        <div class="flex gap-2 mb-2 text-[10px]">
            <button class="bg-blue-600 px-2 py-1 rounded text-white">Today</button>
            <button class="bg-[#0f3460] px-2 py-1 rounded text-gray-400">This Week</button>
            <button class="bg-[#0f3460] px-2 py-1 rounded text-gray-400">This Month</button>
            <button class="bg-[#0f3460] px-2 py-1 rounded text-gray-400">All Time</button>
        </div>
        <div class="text-xs space-y-1">
            <div class="flex justify-between bg-[#1f4068] p-1.5 rounded"><span class="text-yellow-400">1. Ram_Pro</span><span>2500 🪙</span></div>
            <div class="flex justify-between bg-[#1f4068] p-1.5 rounded"><span class="text-gray-300">2. TigerKing</span><span>2100 🪙</span></div>
            <div class="flex justify-between bg-[#1f4068] p-1.5 rounded"><span class="text-orange-400">3. GoatMaster</span><span>1850 🪙</span></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
